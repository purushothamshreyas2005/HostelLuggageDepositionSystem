<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED — SAME AS YOUR CODE) */
body {
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0b1220,#1e3a8a);
    color:white;
}

.container {
    width:90%;
    margin:auto;
    margin-top:20px;
}

h2 { text-align:center; }

.reg-box { text-align:center; margin:20px; }

input {
    padding:14px;
    width:320px;
    border-radius:25px;
    border:none;
    text-align:center;
}

.student-card{
    width:700px;
    margin:20px auto;
    background:#111827;
    border-radius:20px;
    padding:25px 35px;
    box-sizing:border-box;
}

.items {
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.item-btn {
    width:110px;
    height:110px;
    border-radius:20px;
    border:none;
    background:#38bdf8;
    color:black;
    font-weight:600;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.item-btn img { width:40px; margin-bottom:5px; }

.item-btn:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(56,189,248,0.8);
}

.table-box {
    margin-top:20px;
    background:#111827;
    padding:15px;
    border-radius:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th { background:#1e3a8a; padding:10px; }
td { padding:8px; text-align:center; }

tr:nth-child(even) { background:#1f2937; }

.barcode { width:90px; }

.actions { text-align:center; margin-top:20px; }

.btn {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    font-weight:600;
}

.generate { background:#f59e0b; }
.save { background:#16a34a; color:white; }
.print { background:#2563eb; color:white; }
.loading-popup{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.55);

    backdrop-filter:blur(5px);

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.loading-card{

    width:350px;

    padding:35px;

    border-radius:22px;

    background:#111827;

    text-align:center;

    color:white;

    box-shadow:
        0 0 25px #38bdf8,
        0 0 60px rgba(56,189,248,.5);

}

.spinner{

    width:65px;
    height:65px;

    margin:auto;
    margin-bottom:20px;

    border:6px solid rgba(255,255,255,.2);

    border-top:6px solid #38bdf8;

    border-radius:50%;

    animation:spin 1s linear infinite;

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

.spinner{

    width:15px;

    height:15px;

border:2px solid #374151;
border-top:2px solid var(--primary);

    border-radius:50%;

    display:inline-block;

    margin-left:10px;

    animation:spin .8s linear infinite;

    vertical-align:middle;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}
.reg-wrapper{

    position:relative;

    display:inline-block;

}

.reg-wrapper input{

    padding-right:45px;

}

.reg-wrapper .spinner{

    position:absolute;

    right:15px;

    top:50%;

    transform:translateY(-50%);

    margin-left:0;

}
</style>
</head>

<body>

<div class="container">

<h2>Check-In</h2>

<!-- 🔥 NEW (HIDDEN DATA FROM DASHBOARD) -->
<input type="hidden" id="sup_name" value="{{ supervisor_name }}">
<input type="hidden" id="dorm" value="{{ dorm }}">
<input type="hidden" id="hostel" value="{{hostel}}">

<div class="reg-box">
    <div class="reg-wrapper">
<input id="reg" placeholder="Enter Registration Number">
<span id="loadingSpinner" class="spinner" style="display:none;"></span>
</div>
</div>

<!-- Student Fetch Status Message -->
<div id="student_msg"
     style="
        text-align:center;
        margin-bottom:15px;
        font-size:18px;
        font-weight:600;
        min-height:28px;
     ">
</div>

<div id="student" class="student-card"></div>

<div class="items">
<button class="item-btn" onclick="addItem('BED','Matress & Pillow')">
<img src="https://cdn-icons-png.flaticon.com/128/2283/2283945.png">Matress & Pillow
</button>

<button class="item-btn" onclick="addItem('BUC','Bucket & Mug')">
<img src="https://cdn-icons-png.flaticon.com/128/573/573881.png">Bucket & Mug
</button>

<button class="item-btn" onclick="addItem('BOX','Carton Box')">
<img src="https://cdn-icons-png.flaticon.com/128/5790/5790542.png">Carton Box
</button>

<button class="item-btn" onclick="addItem('BAG','Suitcase / Baggage')">
<img src="https://cdn-icons-png.flaticon.com/128/2028/2028376.png">Baggage / Suitcase
</button>

<button class="item-btn" onclick="addItem('OTH','Others')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">Other
</button>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>ULID</th>
<th>Barcode</th>
<th>Delete</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="actions">
<button class="btn generate" onclick="generate()">GENERATE</button>
<button class="btn save" onclick="save()">SAVE & CHECK-IN</button>
<button class="btn print" onclick="printBarcodes()">PRINT</button>
</div>

</div>

<script>

/* (ALL YOUR EXISTING SCRIPT SAME — ONLY SAVE FIXED BELOW) */

let items=[];
let studentLoaded = false;
const limits={BED:1,BUC:1,BOX:3,BAG:2,OTH:2};

function ulidsReady(){
    if(items.length === 0) return false;
    return items.every(i => i.ulids && i.ulids.length > 0);
}

/* FETCH STUDENT */
document.getElementById("reg").addEventListener("input",()=>{
    let reg=document.getElementById("reg").value.trim().toUpperCase();
document.getElementById("loadingSpinner").style.display = "inline-block";
    fetch("/get_student",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"reg="+reg
    })
    .then(r=>r.json())
.finally(()=>{
    document.getElementById("loadingSpinner").style.display = "none";
})
.then(d=>{
        if(d.status==="ok"){
        let supervisorHostel =
    document.getElementById("hostel").value.trim().toUpperCase();

let studentHostel =
    d.hostel.trim().toUpperCase();

if(supervisorHostel !== studentHostel){

    studentLoaded = false;

    document.getElementById("student").innerHTML = "";

    document.getElementById("student_msg").innerHTML =
    "<span style='color:#ef4444;font-weight:bold;'>❌ Access Denied. Cross-Hostel Operations not allowed</span>";

    items = [];
    render();

    return;
}

    studentLoaded = true;

    document.getElementById("student_msg").innerHTML =
        "<span style='color:#22c55e;'>✅ Student Details Fetched Successfully</span>";

    document.getElementById("student").innerHTML = `
<div style="
    display:flex;
    flex-direction:column;
    gap:12px;
    color:white;
    font-size:17px;
">

    <div>
        <span style="font-weight:700;display:inline-block;width:220px;">
            Registration Number
        </span>
        <span>${reg}</span>
    </div>

    <div>
        <span style="font-weight:700;display:inline-block;width:220px;">
            Name
        </span>
        <span>${d.name}</span>
    </div>

    <div>
        <span style="font-weight:700;display:inline-block;width:220px;">
            Mobile Number
        </span>
        <span>${d.phone}</span>
    </div>

    <div>
        <span style="font-weight:700;display:inline-block;width:220px;">
            Email ID
        </span>
        <span>${d.email}</span>
    </div>

    <div>
        <span style="font-weight:700;display:inline-block;width:220px;">
            Hostel Details
        </span>
        <span>${d.room}</span>
    </div>

</div>
`;

    loadExisting(reg);

}
else{

    studentLoaded = false;

    items=[];

    render();

    document.getElementById("student").innerHTML="";

    document.getElementById("student_msg").innerHTML =
        "<span style='color:#ef4444;'>❌ Student Not Found</span>";

}
    });
});
function showLoading(){

    document.getElementById("loadingPopup").style.display="flex";

    document.getElementById("loadingCard").style.boxShadow=
    "0 0 25px #38bdf8,0 0 60px rgba(56,189,248,.5)";

    document.getElementById("loadingContent").innerHTML=`

        <div class="spinner"></div>

        <h2>Processing...</h2>

        <p>Please wait while we complete your request...</p>

    `;

}

function hideLoading(){

    document.getElementById("loadingPopup").style.display="none";

}

function showSuccess(msg){

    document.getElementById("loadingCard").style.boxShadow=
    "0 0 25px #22c55e,0 0 60px rgba(34,197,94,.5)";

    document.getElementById("loadingContent").innerHTML=`

        <div style="font-size:70px;">✅</div>

        <h2>Success</h2>

        <p>${msg}</p>

    `;

    setTimeout(()=>{

        hideLoading();

    },2000);

}

function showError(msg){

    document.getElementById("loadingCard").style.boxShadow=
    "0 0 25px #ef4444,0 0 60px rgba(239,68,68,.5)";

    document.getElementById("loadingContent").innerHTML=`

        <div style="font-size:70px;">❌</div>

        <h2>Failed</h2>

        <p>${msg}</p>

    `;

}

/* ADD */
function addItem(code,name){

    if(!studentLoaded){
        alert("Enter valid Registration Number first");
        return;
    }

    if(code==="OTH"){
        let custom=prompt("Enter item name:");
        if(!custom) return;
        items.push({code:"OTH",name:custom,qty:1});
    } else {
        let item=items.find(i=>i.code===code);

        if(item){
            if(item.qty<limits[code]) item.qty++;
        } else {
            items.push({code,name,qty:1});
        }
    }
    render();
}

/* DELETE */
function removeItem(i){
    fetch("/delete_luggage",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            reg:document.getElementById("reg").value,
            item:items[i].name
        })
    });

    items.splice(i,1);
    render();
}

/* QTY */
function inc(i){ if(items[i].qty<limits[items[i].code]) items[i].qty++; render(); }
function dec(i){ if(items[i].qty>1) items[i].qty--; render(); }

/* GENERATE */
function generate(){

    let reg = document.getElementById("reg").value;

    items.forEach(it=>{

        if(!it.ulids){
            it.ulids = [];
        }

        while(it.ulids.length < it.qty){

            let num = Math.floor(1000 + Math.random() * 9000);

            it.ulids.push(`${reg}-${it.code}-${num}`);
        }

    });

    render();
}

/* 🔥 FIXED SAVE */

function save(){

    if(!ulidsReady()){
        alert("Generate ULID / Barcode first");
        return;
    }

    showLoading();

    fetch("/final_checkin",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        reg:document.getElementById("reg").value,
        items,
        supervisor_name:document.getElementById("sup_name").value,
        dorm:document.getElementById("dorm").value
    })
})
.then(async response => {

    const data = await response.json();

    console.log(data);

    if(response.ok){

        showSuccess("Luggage Checked-In Successfully");

    }else{

        showError(data.message);

    }

})
.catch(err=>{

    console.log(err);

    showError(err.toString());

});

}

/* PRINT (UNCHANGED) */
function printBarcodes(){

    if(!ulidsReady()){
        alert("Generate ULID / Barcode first");
        return;
    }

    let content = "";

    items.forEach(item => {

        if(item.ulids){

            item.ulids.forEach(ulid => {

                content += `

                <div class="label">

                    <img src="/barcode/${ulid}" class="barcode">

                    <div class="ulid">
                        ${ulid}
                    </div>

                    <div class="item">
                        ${item.name}
                    </div>

                </div>

                `;

            });

        }

    });

    let w = window.open("", "_blank");

    w.document.write(`
<!DOCTYPE html>

<html>

<head>

<style>

@page{

    margin:0;

}

body{

    margin:0;

    font-family:Arial,sans-serif;

}

.label{

    width:58mm;
    height:38mm;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    page-break-after:always;

    box-sizing:border-box;

}

.barcode{

    width:50mm;

    height:auto;

}

.ulid{

    margin-top:4mm;

    font-size:11pt;

    font-weight:bold;

}

.item{

    margin-top:2mm;

    font-size:10pt;

}

</style>

</head>

<body>

${content}

</body>

</html>

`);

    w.document.close();

    w.onload = function(){

        w.focus();

        w.print();

        w.close();

    };

}

/* FETCH */
function loadExisting(reg){

    fetch("/get_luggage",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:
    "reg=" + encodeURIComponent(reg) +
    "&dorm=" + encodeURIComponent(document.getElementById("dorm").value)
    })
    .then(r=>r.json())
    .then(data=>{


        items = data;

        render();
    });

}

/* RENDER */
function render(){
    let tb=document.getElementById("tbody");
    tb.innerHTML="";

    items.forEach((i,idx)=>{

        let color = i.status === "Collected" ? "#ef4444" : "#22c55e";

        tb.innerHTML+=`
        <tr>
        <td>${i.name}</td>

        <td>
        <button onclick="dec(${idx})">-</button>
        ${i.qty}
        <button onclick="inc(${idx})">+</button>
        </td>

        <td>${i.ulids?i.ulids.join("<br>"):""}</td>

        <td>
        ${i.ulids
            ? i.ulids.map(u=>`<img class="barcode" src="/barcode/${u}">`).join("")
            : ""
        }
        </td>

        <td>
        ${i.status === "Collected"
            ? "—"
            : `<button onclick="removeItem(${idx})">X</button>`
        }
        </td>

        <td style="color:${color}; font-weight:bold;">
        ${i.status || "Stored"}
        </td>

        </tr>`;
    });
}

// 🔥 GLOBAL ENTER HANDLER
document.querySelectorAll("input").forEach(inp=>{

    inp.addEventListener("keypress", function(e){

        if(e.key === "Enter"){
            e.preventDefault();

            let id = this.id;

            // 🔹 CHECKOUT PAGE LOGIC
            if(id === "ulid"){
                if(typeof checkULID === "function"){
                    checkULID();
                }
                this.value = "";
                return;
            }

            if(id === "reg"){
                if(typeof fetchLuggage === "function"){
                    fetchLuggage();
                }
                // DON'T CLEAR REG (important)
                return;
            }

            // 🔹 CHECKIN PAGE LOGIC
            if(id === "reg"){
                // already handled above
                return;
            }

            // 🔹 DEFAULT BEHAVIOR
            // clear other inputs automatically
            setTimeout(()=>{
                this.value = "";
            }, 50);
        }

    });

});

</script>
<div id="loadingPopup" class="loading-popup">

    <div class="loading-card" id="loadingCard">

        <div id="loadingContent">

            <div class="spinner"></div>

            <h2>Processing...</h2>

            <p>Please wait while we complete your request...</p>

        </div>

    </div>

</div>

</div>
</body>
</html>
