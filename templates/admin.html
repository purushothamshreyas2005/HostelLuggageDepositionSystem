<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins;
    background:#0b1220;
    color:white;
}

/* 🔥 DYNAMIC THEME */
:root {
    --primary: {{ '#2563eb' if hostel == 'MH' else '#7c3aed' }};
    --primary-dark: {{ '#1d4ed8' if hostel == 'MH' else '#6d28d9' }};
}

/* CONTAINER */
.container {
    width:90%;
    margin:auto;
    margin-top:30px;
}

/* TITLE */
h2 {
    text-align:center;
    margin-bottom:20px;
}

/* TOP ROW */
.top {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

/* INPUT */
input {
    padding:12px;
    border-radius:20px;
    border:none;
    text-align:center;
    background:#1e293b;
    color:white;
    outline:none;
    width:220px;
}

input::placeholder {
    color:#9ca3af;
}

/* BUTTON */
button {
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

/* BUTTON COLORS */
.btn-blue {
    background:var(--primary);
    color:white;
}

.btn-blue:hover {
    background:var(--primary-dark);
    box-shadow:0 0 10px var(--primary);
}

.btn-green {
    background:#16a34a;
    color:white;
}

.btn-green:hover {
    background:#15803d;
}

.btn-red {
    background:#dc2626;
    color:white;
}

.btn-red:hover {
    background:#b91c1c;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    overflow:hidden;
    border-radius:10px;
}

/* HEADER */
th {
    background:var(--primary);
    padding:12px;
}

/* DATA */
td {
    padding:10px;
    text-align:center;
}

/* ROW COLORS */
tr:nth-child(even) {
    background:#1f2937;
}

tr:nth-child(odd) {
    background:#111827;
}

/* HOVER */
tr:hover {
    background:#374151;
}

/* LOGOUT */
.logout {
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

/* ===== Statistics Cards ===== */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin:25px 0;
}

.card{

    background:#111827;

    border-radius:15px;

    padding:25px;

    text-align:center;

    border:1px solid #1f2937;

    transition:.25s;
}

.card:hover{

    transform:translateY(-4px);

    border-color:var(--primary);

    box-shadow:0 0 15px rgba(37,99,235,.25);
}

.card h3{

    font-size:34px;

    margin:0;

    color:var(--primary);
}

.card p{

    margin-top:10px;

    color:#cbd5e1;

    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>{{ hostel }} ADMIN DASHBOARD</h2>

<div class="stats">

    <div class="card">
        <h3 id="students">0</h3>
        <p>Students</p>
    </div>

    <div class="card">
        <h3 id="supervisors">0</h3>
        <p>Supervisors</p>
    </div>

    <div class="card">
        <h3 id="luggage">0</h3>
        <p>Total Luggage</p>
    </div>

    <div class="card">
        <h3 id="stored">0</h3>
        <p>Currently Stored</p>
    </div>

    <div class="card">
        <h3 id="collected">0</h3>
        <p>Collected</p>
    </div>

</div>

<!-- LOGOUT -->
<div class="logout">
<button onclick="window.location='/admin_logout'" class="btn-red">Logout</button>
</div>

<!-- SEARCH -->
<div class="top">
<input id="reg" placeholder="Search RegNo">
<button class="btn-blue" onclick="searchReg()">Search</button>

<input id="ulid" placeholder="Search ULID">
<button class="btn-blue" onclick="searchULID()">Search</button>
</div>

<!-- ACTIONS -->
<div class="top">
<button class="btn-green" onclick="loadAll()">Load All</button>
<button class="btn-red" onclick="download()">Download Report</button>
</div>

<div id="table"></div>

</div>

<script>

function renderTable(data){

let html = `
<table>
<tr>
<th>RegNo</th>
<th>Name</th>
<th>Item</th>
<th>ULID</th>
<th>Status</th>
<th>Check-In</th>
<th>Check-Out</th>
</tr>`;

data.forEach(i=>{
html+=`
<tr>
<td>${i.reg || "-"}</td>
<td>${i.name || "-"}</td>
<td>${i.item || "-"}</td>
<td>${i.ulid || "-"}</td>
<td>${i.status || "-"}</td>
<td>${i.in || "-"}</td>
<td>${i.out || "-"}</td>
</tr>`;
});

html+="</table>";

document.getElementById("table").innerHTML = html;
}

function loadAll(){
fetch('/get_admin_luggage',{method:'POST'})
.then(r=>r.json())
.then(renderTable);
}

function searchReg(){

fetch('/admin_search_reg',{
method:'POST',
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"reg="+document.getElementById("reg").value
})
.then(r=>r.json())
.then(data=>{
let formatted = data.map(i=>({
    reg: document.getElementById("reg").value,
    item: i[0],
    ulid: i[1],
    status: i[2]
}));
renderTable(formatted);
});

}

function searchULID(){

fetch('/admin_search_ulid',{
method:'POST',
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"ulid="+document.getElementById("ulid").value
})
.then(r=>r.json())
.then(i=>{
renderTable([{
    reg: i[0],
    name: i[1],
    item: i[2],
    status: i[3]
}]);
});

}

function download(){
window.location = "/admin_report";
}


fetch('/admin_stats',{

    method:'POST'

})

.then(r=>r.json())

.then(data=>{

    document.getElementById("students").innerText=data.students;

    document.getElementById("supervisors").innerText=data.supervisors;

    document.getElementById("luggage").innerText=data.luggage;

    document.getElementById("stored").innerText=data.stored;

    document.getElementById("collected").innerText=data.collected;

});
</script>

</body>
</html>
